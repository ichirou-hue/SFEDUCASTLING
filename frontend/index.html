<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFEDUCASTLING — AI Chess Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0F172A;
            color: #E2E8F0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 30px;
            border-bottom: 2px solid #225A73;
            background: linear-gradient(180deg, #0B1120 0%, #0F172A 100%);
            flex-shrink: 0;
        }

        .sfedu-logo {
            width: 52px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(34, 90, 115, 0.5));
        }

        .top-bar h1 {
            color: #E2E8F0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #3d8da6, #225A73);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .top-bar .version-tag {
            font-size: 10px;
            color: #475569;
            border: 1px solid #1E293B;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: auto;
            letter-spacing: 1px;
        }

        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .board-section {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 6px 4px;
        }

        .player-bar .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1E293B;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            color: #94A3B8;
            border: 2px solid #225A73;
        }

        .player-bar .name { font-size: 14px; font-weight: 600; color: #CBD5E1; }
        .player-bar .rating { font-size: 12px; color: #64748B; }

        .board-outer { position: relative; }

        .coords-rank {
            position: absolute;
            left: -20px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            color: #475569;
            font-weight: 700;
            font-size: 12px;
            text-align: center;
        }

        .coords-file {
            display: flex;
            justify-content: space-around;
            margin-top: 3px;
            color: #475569;
            font-weight: 700;
            font-size: 12px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 3px solid #225A73;
            box-shadow: 0 0 0 1px #1a4a5f, 0 10px 50px rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            overflow: hidden;
        }

        .sq {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: background-color 0.12s;
        }

        .sq:hover {
            filter: brightness(0.92);
        }

        .sq.light { background: #F8FAFC; }
        .sq.dark { background: #225A73; }
        .sq.selected.light { background: #a3c4d1; }
        .sq.selected.dark { background: #1a4a5f; }
        .sq.last-from.light, .sq.last-to.light { background: #c8dce4; }
        .sq.last-from.dark, .sq.last-to.dark { background: #1b4d63; }
        .sq.check-sq { background: radial-gradient(ellipse at center, #e74c3c 0%, #c0392b 50%, transparent 80%) !important; }

        .sq.can-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.18);
            z-index: 2;
        }

        .sq.can-capture::after {
            content: '';
            position: absolute;
            width: 82%;
            height: 82%;
            border-radius: 50%;
            border: 6px solid rgba(0, 0, 0, 0.15);
            background: transparent;
            z-index: 2;
        }

        #game-status {
            text-align: center;
            font-size: 13px;
            color: #94A3B8;
            padding: 6px 0;
        }

        .chat-section {
            width: 40%;
            background: #0B1120;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #225A73;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #1E293B;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #225A73, #1a4558);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }

        .chat-header h2 { font-size: 17px; color: #E2E8F0; font-weight: 600; }

        .chat-header .badge {
            font-size: 11px;
            background: #225A73;
            color: #E2E8F0;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-bottom: 1px solid #1E293B;
            font-size: 13px;
            color: #64748B;
        }

        .status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #225A73;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .move-history {
            padding: 14px 24px;
            border-bottom: 1px solid #1E293B;
        }

        .move-history h3 {
            font-size: 13px;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        #move-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 13px;
            color: #94A3B8;
        }

        .move-pair .num { color: #475569; margin-right: 2px; }
        .move-pair span { padding: 2px 4px; border-radius: 3px; }
        .move-pair span:hover { background: #1E293B; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chat-msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .chat-msg .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #225A73, #1a4558);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .chat-msg .msg-body {
            background: #131B2E;
            padding: 12px 16px;
            border-radius: 0 12px 12px 12px;
            font-size: 14px;
            line-height: 1.6;
            color: #CBD5E1;
            max-width: 85%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .chat-input-area {
            padding: 14px 24px;
            border-top: 1px solid #1E293B;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: #131B2E;
            border: 1px solid #1E293B;
            border-radius: 10px;
            padding: 12px 16px;
            color: #E2E8F0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus { border-color: #225A73; }
        .chat-input-area input::placeholder { color: #475569; }

        .chat-input-area button {
            background: #225A73;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            color: #E2E8F0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input-area button:hover { background: #2d7a9c; }

        .fen-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
            width: 100%;
        }

        .fen-bar input {
            flex: 1;
            background: #131B2E;
            border: 1px solid #225A73;
            border-radius: 6px;
            padding: 8px 12px;
            color: #CBD5E1;
            font-size: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
        }

        .fen-bar input:focus { border-color: #3d8da6; color: #E2E8F0; }

        .fen-bar button {
            background: #225A73;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            color: #E2E8F0;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .fen-bar button:hover { background: #2d7a9c; }

        .fen-bar .fen-file-btn {
            background: #1E293B;
            font-size: 15px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #2a3a50;
        }

        .fen-bar .fen-file-btn:hover { background: #2a3a50; }
    </style>
</head>
<body>
    <div class="top-bar">
        <img src="logo_sfedu_white.png" alt="ЮФУ" class="sfedu-logo">
        <h1>SFEDUCASTLING</h1>
        <span class="version-tag">AI CHESS PLATFORM</span>
    </div>

    <div class="main-area">
        <div class="board-section">
            <div class="board-wrapper">
                <div class="player-bar">
                    <div class="avatar">♚</div>
                    <div>
                        <div class="name">Maia Chess</div>
                        <div class="rating">~1500 ELO</div>
                    </div>
                </div>

                <div class="board-outer">
                    <div class="coords-rank">
                        <span>8</span><span>7</span><span>6</span><span>5</span>
                        <span>4</span><span>3</span><span>2</span><span>1</span>
                    </div>
                    <div id="board"></div>
                    <div class="coords-file">
                        <span>a</span><span>b</span><span>c</span><span>d</span>
                        <span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                </div>

                <div class="player-bar">
                    <div class="avatar">♔</div>
                    <div>
                        <div class="name">Студент ЮФУ</div>
                        <div class="rating">Белые</div>
                    </div>
                </div>
                <div id="game-status">Ваш ход</div>

                <div class="fen-bar">
                    <input type="text" id="fen-input" value="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1" placeholder="Вставьте FEN...">
                    <button id="fen-load">Загрузить</button>
                    <button class="fen-file-btn" id="fen-file" title="Загрузить из файла">📂</button>

        <div class="chat-section">
            <div class="chat-header">
                <div class="icon">⚡</div>
                <h2>Анализ GigaChat</h2>
                <span class="badge">AI</span>
            </div>

            <div class="status-bar">
                <span class="dot"></span>
                <span>Maia Chess Engine подключён</span>
            </div>

            <div class="move-history">
                <h3>История ходов</h3>
                <div id="move-list"></div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="chat-msg">
                    <div class="msg-avatar">⚡</div>
                    <div class="msg-body">
                        Добро пожаловать в SFEDUCASTLING! Сделайте первый ход, и я начну анализ вашей партии.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Задайте вопрос по позиции...">
                <button id="chat-send">Отправить</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var UNICODE = {
            wK: '\u2654', wQ: '\u2655', wR: '\u2656', wB: '\u2657', wN: '\u2658', wP: '\u2659',
            bK: '\u265A', bQ: '\u265B', bR: '\u265C', bB: '\u265D', bN: '\u265E', bP: '\u265F'
        };

        var FILES = ['a','b','c','d','e','f','g','h'];
        var INIT_POS = [
            ['bR','bN','bB','bQ','bK','bB','bN','bR'],
            ['bP','bP','bP','bP','bP','bP','bP','bP'],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            ['wP','wP','wP','wP','wP','wP','wP','wP'],
            ['wR','wN','wB','wQ','wK','wB','wN','wR']
        ];

        var position = [];
        var selected = null;
        var lastFrom = null;
        var lastTo = null;
        var turn = 'w';
        var moveHistory = [];
        var moveNumber = 1;
        var castling = { wK: true, wQ: true, bK: true, bQ: true };
        var enPassant = null;
        var boardEl = document.getElementById('board');

        function init() {
            position = [];
            for (var r = 0; r < 8; r++) {
                position[r] = [];
                for (var c = 0; c < 8; c++) {
                    position[r][c] = INIT_POS[r][c];
                }
            }
            turn = 'w';
            selected = null;
            lastFrom = null;
            lastTo = null;
            moveHistory = [];
            moveNumber = 1;
            castling = { wK: true, wQ: true, bK: true, bQ: true };
            enPassant = null;
            render();
            updateStatus();
        }

        function sqName(r, c) { return FILES[c] + (8 - r); }
        function rc(name) { return { r: 8 - parseInt(name[1]), c: FILES.indexOf(name[0]) }; }

        function at(r, c) {
            if (r < 0 || r > 7 || c < 0 || c > 7) return undefined;
            return position[r][c];
        }

        function colorOf(p) { return p ? p[0] : null; }
        function typeOf(p) { return p ? p[1] : null; }
        function enemy() { return turn === 'w' ? 'b' : 'w'; }

        function legalMoves(fromR, fromC) {
            var piece = at(fromR, fromC);
            if (!piece || colorOf(piece) !== turn) return [];
            var raw = rawMoves(fromR, fromC, piece);
            var legal = [];
            for (var i = 0; i < raw.length; i++) {
                var m = raw[i];
                if (!wouldBeInCheck(fromR, fromC, m.r, m.c, m.special)) {
                    legal.push(m);
                }
            }
            return legal;
        }

        function rawMoves(fr, fc, piece) {
            var moves = [];
            var color = colorOf(piece);
            var type = typeOf(piece);
            var opp = color === 'w' ? 'b' : 'w';

            if (type === 'P') {
                var dir = color === 'w' ? -1 : 1;
                var startRow = color === 'w' ? 6 : 1;
                if (!at(fr + dir, fc)) {
                    moves.push({ r: fr + dir, c: fc });
                    if (fr === startRow && !at(fr + 2 * dir, fc)) {
                        moves.push({ r: fr + 2 * dir, c: fc, special: 'double' });
                    }
                }
                for (var dc = -1; dc <= 1; dc += 2) {
                    var nc = fc + dc;
                    if (nc < 0 || nc > 7) continue;
                    var target = at(fr + dir, nc);
                    if (target && colorOf(target) === opp) {
                        moves.push({ r: fr + dir, c: nc });
                    }
                    if (enPassant && enPassant === sqName(fr + dir, nc)) {
                        moves.push({ r: fr + dir, c: nc, special: 'enpassant' });
                    }
                }
            }

            if (type === 'N') {
                var jumps = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                for (var j = 0; j < jumps.length; j++) {
                    var nr = fr + jumps[j][0], nc2 = fc + jumps[j][1];
                    if (nr < 0 || nr > 7 || nc2 < 0 || nc2 > 7) continue;
                    var t = at(nr, nc2);
                    if (!t || colorOf(t) === opp) moves.push({ r: nr, c: nc2 });
                }
            }

            if (type === 'B' || type === 'Q') {
                var bDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
                for (var d = 0; d < bDirs.length; d++) slide(fr, fc, bDirs[d], opp, moves);
            }

            if (type === 'R' || type === 'Q') {
                var rDirs = [[-1,0],[1,0],[0,-1],[0,1]];
                for (var d2 = 0; d2 < rDirs.length; d2++) slide(fr, fc, rDirs[d2], opp, moves);
            }

            if (type === 'K') {
                for (var dr = -1; dr <= 1; dr++) {
                    for (var dc3 = -1; dc3 <= 1; dc3++) {
                        if (dr === 0 && dc3 === 0) continue;
                        var kr = fr + dr, kc = fc + dc3;
                        if (kr < 0 || kr > 7 || kc < 0 || kc > 7) continue;
                        var kt = at(kr, kc);
                        if (!kt || colorOf(kt) === opp) moves.push({ r: kr, c: kc });
                    }
                }
                if (castling[color + 'K'] && !at(fr, 5) && !at(fr, 6) && at(fr, 7) === color + 'R') {
                    if (!isAttacked(fr, 4, opp) && !isAttacked(fr, 5, opp) && !isAttacked(fr, 6, opp)) {
                        moves.push({ r: fr, c: 6, special: 'castle-k' });
                    }
                }
                if (castling[color + 'Q'] && !at(fr, 3) && !at(fr, 2) && !at(fr, 1) && at(fr, 0) === color + 'R') {
                    if (!isAttacked(fr, 4, opp) && !isAttacked(fr, 3, opp) && !isAttacked(fr, 2, opp)) {
                        moves.push({ r: fr, c: 2, special: 'castle-q' });
                    }
                }
            }

            return moves;
        }

        function slide(fr, fc, dir, opp, moves) {
            var r = fr + dir[0], c = fc + dir[1];
            while (r >= 0 && r <= 7 && c >= 0 && c <= 7) {
                var t = at(r, c);
                if (!t) { moves.push({ r: r, c: c }); }
                else if (colorOf(t) === opp) { moves.push({ r: r, c: c }); break; }
                else break;
                r += dir[0]; c += dir[1];
            }
        }

        function isAttacked(r, c, byColor) {
            for (var rr = 0; rr < 8; rr++) {
                for (var cc = 0; cc < 8; cc++) {
                    var p = at(rr, cc);
                    if (!p || colorOf(p) !== byColor) continue;
                    var mvs = rawMoves(rr, cc, p);
                    for (var i = 0; i < mvs.length; i++) {
                        if (mvs[i].r === r && mvs[i].c === c) return true;
                    }
                }
            }
            return false;
        }

        function findKing(color) {
            for (var r = 0; r < 8; r++)
                for (var c = 0; c < 8; c++)
                    if (position[r][c] === color + 'K') return { r: r, c: c };
            return null;
        }

        function inCheck(color) {
            var k = findKing(color);
            if (!k) return false;
            return isAttacked(k.r, k.c, color === 'w' ? 'b' : 'w');
        }

        function wouldBeInCheck(fr, fc, tr, tc, special) {
            var backup = [];
            backup.push({ r: fr, c: fc, v: position[fr][fc] });
            backup.push({ r: tr, c: tc, v: position[tr][tc] });

            var movingPiece = position[fr][fc];
            position[tr][tc] = movingPiece;
            position[fr][fc] = null;

            if (special === 'enpassant') {
                var epR = colorOf(movingPiece) === 'w' ? tr + 1 : tr - 1;
                backup.push({ r: epR, c: tc, v: position[epR][tc] });
                position[epR][tc] = null;
            }
            if (special === 'castle-k') {
                backup.push({ r: fr, c: 7, v: position[fr][7] });
                backup.push({ r: fr, c: 5, v: position[fr][5] });
                position[fr][5] = position[fr][7];
                position[fr][7] = null;
            }
            if (special === 'castle-q') {
                backup.push({ r: fr, c: 0, v: position[fr][0] });
                backup.push({ r: fr, c: 3, v: position[fr][3] });
                position[fr][3] = position[fr][0];
                position[fr][0] = null;
            }

            var check = inCheck(colorOf(movingPiece));

            for (var i = 0; i < backup.length; i++) {
                position[backup[i].r][backup[i].c] = backup[i].v;
            }

            return check;
        }

        function hasAnyLegalMove(color) {
            var savedTurn = turn;
            turn = color;
            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    if (at(r, c) && colorOf(at(r, c)) === color) {
                        if (legalMoves(r, c).length > 0) { turn = savedTurn; return true; }
                    }
                }
            }
            turn = savedTurn;
            return false;
        }

        function makeMove(fr, fc, tr, tc, special) {
            var piece = position[fr][fc];
            var captured = position[tr][tc];
            var color = colorOf(piece);
            var type = typeOf(piece);
            var moveStr = '';

            if (special === 'castle-k') { moveStr = 'O-O'; }
            else if (special === 'castle-q') { moveStr = 'O-O-O'; }
            else {
                if (type !== 'P') moveStr += type;
                if (captured || special === 'enpassant') {
                    if (type === 'P') moveStr += FILES[fc];
                    moveStr += 'x';
                }
                moveStr += sqName(tr, tc);
            }

            position[tr][tc] = piece;
            position[fr][fc] = null;

            if (special === 'enpassant') {
                var epRow = color === 'w' ? tr + 1 : tr - 1;
                position[epRow][tc] = null;
            }
            if (special === 'castle-k') {
                position[fr][5] = position[fr][7];
                position[fr][7] = null;
            }
            if (special === 'castle-q') {
                position[fr][3] = position[fr][0];
                position[fr][0] = null;
            }

            if (special === 'double') {
                enPassant = sqName((fr + tr) / 2, fc);
            } else {
                enPassant = null;
            }

            var promoRow = color === 'w' ? 0 : 7;
            if (type === 'P' && tr === promoRow) {
                position[tr][tc] = color + 'Q';
                moveStr += '=Q';
            }

            if (type === 'K') { castling[color + 'K'] = false; castling[color + 'Q'] = false; }
            if (type === 'R' && fc === 0) castling[color + 'Q'] = false;
            if (type === 'R' && fc === 7) castling[color + 'K'] = false;
            if (tr === 0 && tc === 7) castling['bK'] = false;
            if (tr === 0 && tc === 0) castling['bQ'] = false;
            if (tr === 7 && tc === 7) castling['wK'] = false;
            if (tr === 7 && tc === 0) castling['wQ'] = false;

            lastFrom = sqName(fr, fc);
            lastTo = sqName(tr, tc);

            turn = enemy();

            if (inCheck(turn)) moveStr += hasAnyLegalMove(turn) ? '+' : '#';

            if (color === 'w') {
                moveHistory.push({ num: moveNumber, w: moveStr, b: null });
            } else {
                if (moveHistory.length > 0) {
                    moveHistory[moveHistory.length - 1].b = moveStr;
                }
                moveNumber++;
            }
        }

        function render() {
            boardEl.innerHTML = '';
            var legalDests = [];
            var legalMap = {};
            if (selected) {
                var s = rc(selected);
                legalDests = legalMoves(s.r, s.c);
                for (var i = 0; i < legalDests.length; i++) {
                    legalMap[legalDests[i].r + ',' + legalDests[i].c] = legalDests[i];
                }
            }

            var checkSq = null;
            if (inCheck(turn)) {
                var k = findKing(turn);
                if (k) checkSq = k.r + ',' + k.c;
            }

            var topBar = document.querySelector('.top-bar');
            var topH = topBar ? topBar.offsetHeight : 58;
            var availH = window.innerHeight - topH;
            var availW = window.innerWidth * 0.6;
            var size = Math.floor(Math.min(availW - 80, availH - 230) / 8) * 8;
            boardEl.style.width = size + 'px';
            boardEl.style.height = size + 'px';

            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    var sq = document.createElement('div');
                    var isLight = (r + c) % 2 === 0;
                    var name = sqName(r, c);
                    sq.className = 'sq ' + (isLight ? 'light' : 'dark');
                    sq.dataset.sq = name;

                    if (name === selected) sq.classList.add('selected');
                    if (name === lastFrom) sq.classList.add('last-from');
                    if (name === lastTo) sq.classList.add('last-to');
                    if (checkSq === r + ',' + c) sq.classList.add('check-sq');

                    if (legalMap[r + ',' + c]) {
                        sq.classList.add(at(r, c) ? 'can-capture' : 'can-move');
                    }

                    var piece = at(r, c);
                    if (piece) {
                        var span = document.createElement('span');
                        var fs = (size / 8 * 0.80);
                        span.style.fontSize = fs + 'px';
                        span.style.lineHeight = '1';
                        span.style.pointerEvents = 'none';
                        var isWhite = colorOf(piece) === 'w';
                        if (isWhite) {
                            span.style.color = '#FFFFFF';
                            span.style.textShadow =
                                '-1px -1px 0 #1a1a1a, 1px -1px 0 #1a1a1a, ' +
                                '-1px 1px 0 #1a1a1a, 1px 1px 0 #1a1a1a, ' +
                                '0 0 6px rgba(0,0,0,0.5)';
                        } else {
                            span.style.color = '#1a1a1a';
                            span.style.textShadow =
                                '-1px -1px 0 #ccc, 1px -1px 0 #ccc, ' +
                                '-1px 1px 0 #ccc, 1px 1px 0 #ccc, ' +
                                '0 0 6px rgba(0,0,0,0.3)';
                        }
                        span.textContent = UNICODE[piece];
                        sq.appendChild(span);
                    }

                    sq.addEventListener('click', onSquareClick);
                    boardEl.appendChild(sq);
                }
            }
        }

        function onSquareClick(e) {
            var name = e.currentTarget.dataset.sq;
            var pos = rc(name);

            if (selected) {
                var from = rc(selected);
                var legal = legalMoves(from.r, from.c);
                var move = null;
                for (var i = 0; i < legal.length; i++) {
                    if (legal[i].r === pos.r && legal[i].c === pos.c) { move = legal[i]; break; }
                }

                if (move) {
                    makeMove(from.r, from.c, move.r, move.c, move.special);
                    selected = null;
                    render();
                    updateMoveList();
                    updateStatus();

                    if (!isGameOver() && turn === 'b') {
                        setTimeout(maiaMove, 500);
                    }
                    return;
                }

                var clickedPiece = at(pos.r, pos.c);
                if (clickedPiece && colorOf(clickedPiece) === turn) {
                    selected = name;
                    render();
                    return;
                }

                selected = null;
                render();
                return;
            }

            var p = at(pos.r, pos.c);
            if (p && colorOf(p) === turn && turn === 'w') {
                selected = name;
                render();
            }
        }

        function isGameOver() {
            if (!hasAnyLegalMove(turn)) return true;
            return false;
        }

        function maiaMove() {
            var allMoves = [];
            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    if (at(r, c) && colorOf(at(r, c)) === 'b') {
                        var mvs = legalMoves(r, c);
                        for (var i = 0; i < mvs.length; i++) {
                            allMoves.push({ fr: r, fc: c, tr: mvs[i].r, tc: mvs[i].c, special: mvs[i].special });
                        }
                    }
                }
            }
            if (allMoves.length === 0) return;
            var pick = allMoves[Math.floor(Math.random() * allMoves.length)];
            makeMove(pick.fr, pick.fc, pick.tr, pick.tc, pick.special);
            selected = null;
            render();
            updateMoveList();
            updateStatus();

            if (moveHistory.length === 1 && moveHistory[0].b) {
                addChatMessage('Интересное начало! Посмотрим, как развернётся партия.');
            }
        }

        function updateMoveList() {
            var container = document.getElementById('move-list');
            container.innerHTML = '';
            for (var i = 0; i < moveHistory.length; i++) {
                var pair = document.createElement('span');
                pair.className = 'move-pair';
                var html = '<span class="num">' + moveHistory[i].num + '.</span> '
                    + '<span>' + moveHistory[i].w + '</span>';
                if (moveHistory[i].b) {
                    html += ' <span>' + moveHistory[i].b + '</span>';
                }
                pair.innerHTML = html;
                container.appendChild(pair);
            }
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus() {
            var el = document.getElementById('game-status');
            var noMoves = !hasAnyLegalMove(turn);
            if (noMoves && inCheck(turn)) {
                el.textContent = turn === 'w' ? 'Мат — чёрные победили' : 'Мат — белые победили!';
                addChatMessage('Партия окончена. Отличная игра!');
            } else if (noMoves) {
                el.textContent = 'Пат — ничья';
                addChatMessage('Партия завершилась вничью (пат).');
            } else if (inCheck(turn)) {
                el.textContent = turn === 'w' ? 'Шах! Ваш ход' : 'Шах! Maia думает...';
            } else {
                el.textContent = turn === 'w' ? 'Ваш ход' : 'Maia думает...';
            }
        }

        function addChatMessage(text) {
            var container = document.getElementById('chat-messages');
            var msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.innerHTML = '<div class="msg-avatar">⚡</div><div class="msg-body">' + text + '</div>';
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        document.getElementById('chat-send').addEventListener('click', sendChat);
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendChat();
        });

        function sendChat() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim();
            if (!text) return;
            input.value = '';
            var container = document.getElementById('chat-messages');
            var userMsg = document.createElement('div');
            userMsg.className = 'chat-msg';
            userMsg.innerHTML = '<div class="msg-avatar" style="background:#1E293B">👤</div>'
                + '<div class="msg-body" style="border-radius:12px 0 12px 12px">' + escapeHtml(text) + '</div>';
            container.appendChild(userMsg);
            container.scrollTop = container.scrollHeight;
            setTimeout(function() {
                addChatMessage('Анализ позиции будет доступен после подключения GigaChat API.');
            }, 500);
        }

        function loadFen(fen) {
            fen = fen.trim();
            if (!fen) return;
            var parts = fen.split(' ');
            var rows = parts[0].split('/');
            if (rows.length !== 8) return;

            position = [];
            var pieceMap = {
                'r':'bR','n':'bN','b':'bB','q':'bQ','k':'bK','p':'bP',
                'R':'wR','N':'wN','B':'wB','Q':'wQ','K':'wK','P':'wP'
            };
            for (var r = 0; r < 8; r++) {
                position[r] = [];
                var col = 0;
                for (var i = 0; i < rows[r].length; i++) {
                    var ch = rows[r][i];
                    if (ch >= '1' && ch <= '8') {
                        var empty = parseInt(ch);
                        for (var e = 0; e < empty; e++) position[r][col++] = null;
                    } else if (pieceMap[ch]) {
                        position[r][col++] = pieceMap[ch];
                    }
                }
            }

            turn = (parts.length > 1 && parts[1] === 'b') ? 'b' : 'w';
            selected = null;
            lastFrom = null;
            lastTo = null;
            moveHistory = [];
            moveNumber = 1;
            castling = { wK: false, wQ: false, bK: false, bQ: false };
            if (parts.length > 2) {
                var c = parts[2];
                if (c.indexOf('K') !== -1) castling.wK = true;
                if (c.indexOf('Q') !== -1) castling.wQ = true;
                if (c.indexOf('k') !== -1) castling.bK = true;
                if (c.indexOf('q') !== -1) castling.bQ = true;
            }
            enPassant = (parts.length > 3 && parts[3] !== '-') ? parts[3] : null;

            document.getElementById('fen-input').value = fen;
            document.getElementById('move-list').innerHTML = '';
            render();
            updateStatus();
            addChatMessage('Позиция загружена из FEN.');
        }

        document.getElementById('fen-load').addEventListener('click', function() {
            loadFen(document.getElementById('fen-input').value);
        });
        document.getElementById('fen-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadFen(e.target.value);
        });
        document.getElementById('fen-file').addEventListener('click', function() {
            document.getElementById('fen-file-input').click();
        });
        document.getElementById('fen-file-input').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                var line = ev.target.result.trim().split('\n')[0].trim();
                if (line) loadFen(line);
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        window.addEventListener('resize', function() { render(); });

        init();
    })();
    </script>
</body>
</html>
